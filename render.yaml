services:
  - type: web
    name: forexguard
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install torch --index-url https://download.pytorch.org/whl/cpu
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FOREXGUARD_FAST
        value: "1"
    healthCheckPath: /health
